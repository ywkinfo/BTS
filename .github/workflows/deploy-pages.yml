name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute site URL
        id: site
        env:
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"

          if [ -n "$CUSTOM_DOMAIN" ]; then
            site_url="https://$CUSTOM_DOMAIN"
          elif [ "$repo_name" = "$owner.github.io" ]; then
            site_url="https://$owner.github.io"
          else
            site_url="https://$owner.github.io/$repo_name"
          fi

          echo "site_url=$site_url" >> "$GITHUB_OUTPUT"
          echo "Using site URL: $site_url"

      - name: Build static Pages bundle
        run: |
          python tools/build_pages.py \
            --site-url "${{ steps.site.outputs.site_url }}" \
            --output-dir "_site"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
