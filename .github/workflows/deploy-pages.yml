name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compute site URL
        id: site
        env:
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"

          if [ -n "$CUSTOM_DOMAIN" ]; then
            site_url="https://$CUSTOM_DOMAIN"
          elif [ "$repo_name" = "$owner.github.io" ]; then
            site_url="https://$owner.github.io"
          else
            site_url="https://$owner.github.io/$repo_name"
          fi

          echo "site_url=$site_url" >> "$GITHUB_OUTPUT"
          echo "Using site URL: $site_url"

      - name: Build static Pages bundle
        env:
          SEARCH_CONSOLE_VERIFICATION: ${{ vars.SEARCH_CONSOLE_VERIFICATION }}
          SEARCH_CONSOLE_VERIFICATION_SECRET: ${{ secrets.SEARCH_CONSOLE_VERIFICATION }}
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
          GA4_MEASUREMENT_ID_SECRET: ${{ secrets.GA4_MEASUREMENT_ID }}
        run: |
          search_console_verification="$SEARCH_CONSOLE_VERIFICATION"
          ga4_measurement_id="$GA4_MEASUREMENT_ID"

          if [ -z "$search_console_verification" ]; then
            search_console_verification="$SEARCH_CONSOLE_VERIFICATION_SECRET"
          fi

          if [ -z "$ga4_measurement_id" ]; then
            ga4_measurement_id="$GA4_MEASUREMENT_ID_SECRET"
          fi

          build_args=(
            --site-url "${{ steps.site.outputs.site_url }}"
            --output-dir "_site"
          )

          if [ -n "$search_console_verification" ]; then
            build_args+=(--search-console-verification "$search_console_verification")
          fi

          if [ -n "$ga4_measurement_id" ]; then
            build_args+=(--ga4-measurement-id "$ga4_measurement_id")
          fi

          python tools/build_pages.py "${build_args[@]}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
